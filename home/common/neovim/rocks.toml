[bundles.neorg]
items = [
  "neorg",
  "neorg-archive",
  "neorg-interim-ls",
  "neorg-query",
  "neorg-templates",
  "neorg-worklog",
]

[bundles.blink]
items = ["blink.cmp", "blink.compat", "cmp-npm", "luasnip"]

[bundles.lsp]
items = ["lsp_lines.nvim", "nvim-lspconfig"]

[bundles.treesitter]
items = ["nvim-treesitter-context", "nvim-ts-autotag"]

[dev]
tree-sitter-mog = "/home/drakeb/workspace/mog/crates/tree-sitter"

[treesitter]
auto_highlight = "all"
auto_install = "prompt"

[treesitter.parser_map]
lisp = "fennel"
mg = "mog"

[config]
auto_setup = true
colorscheme = "base16"

[config.options]
cursorline = true
expandtab = true
foldlevelstart = 99
guifont = "MonoLisa Nerd Font"
number = true
shiftwidth = 2
smartindent = true
tabstop = 2
timeout = true
timeoutlen = 300
equalalways = false
winborder = "rounded"
winwidth = 10
winminwidth = 10
